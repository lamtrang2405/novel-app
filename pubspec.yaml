name: novel_app
description: "Romance & Drama Audio Novel App — immersive reading and listening experience."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Audio playback
  just_audio: ^0.9.46
  audio_service: ^0.18.16

  # Networking & images
  cached_network_image: ^3.4.1
  http: ^1.3.0

  # Local storage
  shared_preferences: ^2.5.2

  # Fonts & icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Animations
  flutter_animate: ^4.5.2

  # UI utilities
  smooth_page_indicator: ^1.2.1
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/covers/
    - assets/data/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
