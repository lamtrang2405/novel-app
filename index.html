<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/novel-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DramaVerse — Your Drama. Your Story. Romance & drama audio novels.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DramaVerse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DramaVerse</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #0F0F1A; color: #fff; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #loading { text-align: center; }
    #loading p { color: #FF2D78; font-size: 1.2rem; }
    .spinner { width: 40px; height: 40px; margin: 0 auto 1rem; border: 3px solid #161625; border-top-color: #FF2D78; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display: none; color: #ff6b6b; max-width: 90%; word-break: break-all; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading DramaVerse…</p>
  </div>
  <div id="error"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('loading').style.display = 'none';
      var err = document.getElementById('error');
      err.style.display = 'block';
      err.textContent = 'Load error: ' + (e.message || e.reason || 'Unknown');
    });
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
    setTimeout(function() {
      if (document.getElementById('loading').style.display !== 'none') {
        document.getElementById('loading').innerHTML = '<p>Still loading… Check the browser console (F12) for errors.</p>';
      }
    }, 8000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
